# Release Desktop — triggered by v* tags (e.g. v1.2.3) or manual dispatch.
# Builds, signs, notarizes (via App Store Connect API key) and publishes
# the macOS Electron app to GitHub Releases.
#
# Required repo secrets (set via `gh secret set`):
#   CSC_LINK               base64 of the Developer ID Application .p12
#   CSC_KEY_PASSWORD       passphrase of the .p12
#   APPLE_API_KEY_BASE64   base64 of the ASC API .p8 file
#   APPLE_API_KEY_ID       e.g. S4KK887QNJ
#   APPLE_API_ISSUER       e.g. 69a6de78-81ae-47e3-e053-5b8c7c11a4d1
#   APPLE_TEAM_ID          e.g. 3CU82K426J
# Publishing uses the built-in GITHUB_TOKEN.

name: Release Desktop

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-mac:
    name: Build & Publish macOS
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Decode ASC API key to disk
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        run: |
          mkdir -p "${{ runner.temp }}/private_keys"
          echo "$APPLE_API_KEY_BASE64" | base64 --decode > "${{ runner.temp }}/private_keys/AuthKey.p8"

      - name: Build & Publish Electron app
        env:
          # Code signing: electron-builder reads CSC_LINK (base64 p12) + CSC_KEY_PASSWORD,
          # imports the cert into a temporary keychain, then signs.
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # Notarization via @electron/notarize using the App Store Connect API key.
          APPLE_API_KEY: ${{ runner.temp }}/private_keys/AuthKey.p8
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # GitHub release publishing.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm electron:publish

      - name: Staple notarization ticket on DMGs
        # electron-builder notarizes the .app, but not the .dmg container —
        # staple the dmgs directly so Gatekeeper accepts them offline.
        env:
          APPLE_API_KEY: ${{ runner.temp }}/private_keys/AuthKey.p8
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          for dmg in release/*.dmg; do
            xcrun notarytool submit "$dmg" \
              --key "$APPLE_API_KEY" --key-id "$APPLE_API_KEY_ID" \
              --issuer "$APPLE_API_ISSUER" --wait
            xcrun stapler staple "$dmg"
            xcrun stapler validate "$dmg"
          done
