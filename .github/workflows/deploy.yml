name: CD — Deploy to Production

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ────────────────────────────────────────────────────────────────
  # Job 1 — Lint + Typecheck (BLOCKING)
  # ────────────────────────────────────────────────────────────────
  lint-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        # Required: @prisma/client exports (PrismaClient, model types) are
        # generated, not shipped — without this, tsc fails with TS2305 on
        # every model import.
        env:
          PRISMA_PROVIDER: postgresql
        run: pnpm db:generate

      - name: Run ESLint
        run: pnpm lint

      - name: Run Typecheck
        run: pnpm typecheck

  # ────────────────────────────────────────────────────────────────
  # Job 2 — Vitest unit + integration tests (BLOCKING)
  # ────────────────────────────────────────────────────────────────
  vitest:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint-typecheck

    env:
      # See ci.yml — kimi.ts throws at import time without it.
      HYPERCLI_API_KEY: ${{ secrets.HYPERCLI_API_KEY }}
      HYPERCLI_BASE_URL: ${{ secrets.HYPERCLI_BASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        # Default sqlite provider — generated types are provider-agnostic.
        # The deploy step below switches to postgresql for `db push` against prod.
        run: pnpm db:generate

      - name: Push schema to local SQLite (integration tests touch real DB)
        env:
          DATABASE_URL: "file:./prisma/dev.db"
        run: pnpm exec prisma db push

      - name: Run Vitest
        run: pnpm test

  # ────────────────────────────────────────────────────────────────
  # Job 3 — Build production (BLOCKING)
  # ────────────────────────────────────────────────────────────────
  build:
    name: Build Production
    runs-on: ubuntu-latest
    needs: vitest

    env:
      # Next.js inlines NEXT_PUBLIC_* variables at build time.
      NEXT_PUBLIC_PRIVY_APP_ID: ${{ secrets.NEXT_PUBLIC_PRIVY_APP_ID }}
      NEXT_PUBLIC_CHAIN_RPC_URL: ${{ secrets.NEXT_PUBLIC_CHAIN_RPC_URL }}
      NEXT_PUBLIC_EVENT_LOGGER_ADDRESS: ${{ secrets.NEXT_PUBLIC_EVENT_LOGGER_ADDRESS }}
      NEXT_PUBLIC_POR_REGISTRY_ADDRESS: ${{ secrets.NEXT_PUBLIC_POR_REGISTRY_ADDRESS }}
      NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
      # Server-side secrets validated by src/lib/env.ts at module load (so they
      # must be present even during `next build` page-data collection, which
      # imports the env module). Build does NOT open a DB connection — it just
      # validates the env shape.
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      PRIVY_APP_SECRET: ${{ secrets.PRIVY_APP_SECRET }}
      INNGEST_SIGNING_KEY: ${{ secrets.INNGEST_SIGNING_KEY }}
      HYPERCLI_API_KEY: ${{ secrets.HYPERCLI_API_KEY }}
      HYPERCLI_BASE_URL: ${{ secrets.HYPERCLI_BASE_URL }}
      HEARST_PUBLISHER: ${{ secrets.HEARST_PUBLISHER }}
      ADMIN_EMAILS: ${{ secrets.ADMIN_EMAILS }}
      ADMIN_INITIAL_PASSWORD: ${{ secrets.ADMIN_INITIAL_PASSWORD }}
      FIREBLOCKS_API_KEY: ${{ secrets.FIREBLOCKS_API_KEY }}
      FIREBLOCKS_BASE_URL: ${{ secrets.FIREBLOCKS_BASE_URL }}
      FIREBLOCKS_VAULT_ACCOUNT_IDS: ${{ secrets.FIREBLOCKS_VAULT_ACCOUNT_IDS }}
      # Sentry sourcemap upload (optional — skipped if absent)
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
      SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      # Standalone output required by the production Dockerfile
      STANDALONE_BUILD: 1
      # Ensure demo mode is off in production builds
      DEMO_MODE_DEFAULT: 0

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build application
        run: pnpm build

  # ────────────────────────────────────────────────────────────────
  # Job 4 — Deploy to Railway (BLOCKING)
  # ────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: build
    # Manual gate: requires a reviewer to approve before the step runs.
    # Configure required reviewers in repo Settings → Environments → production.
    environment:
      name: production
      url: https://connect.hearst.app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply database schema (db push, state-driven)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PRISMA_PROVIDER: postgresql
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::DATABASE_URL secret is empty — refusing to db push (would silently fallback to file:./prisma/dev.db)."
            exit 1
          fi
          node scripts/prisma-provider.mjs
          # Note: db push (state-driven) is used instead of migrate deploy because
          # the versioned migrations in prisma/migrations/ are SQLite dialect
          # (DATETIME/DECIMAL/TEXT PK) and the migration_lock.toml is pinned to
          # sqlite. db push diffs schema.prisma directly against the live DB.
          # Atomicity caveat: if the following 'Deploy to Railway' step fails,
          # the DB will be ahead of the deployed code. Acceptable for MVP (no
          # destructive changes deployed without manual review). Future: move
          # the schema sync into Railway's startCommand for true atomicity.
          pnpm exec prisma db push

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        # RAILWAY_TOKEN is a Project Token scoped to the `production`
        # environment of this project — it already encodes project + env, so
        # passing --project / --environment causes "Unauthorized". Only --service
        # is needed to disambiguate within the environment.
        # See: https://docs.railway.com/integrations/api#project-tokens
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up \
            --service "${{ secrets.RAILWAY_SERVICE_NAME }}" \
            --ci
