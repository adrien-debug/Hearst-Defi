name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ────────────────────────────────────────────────────────────────
  # Job 1 — Lint + Typecheck (BLOCKING)
  # ────────────────────────────────────────────────────────────────
  lint-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        # Required: @prisma/client exports (PrismaClient, model types) are
        # generated, not shipped — without this, tsc fails with TS2305 on
        # every model import.
        env:
          PRISMA_PROVIDER: postgresql
        run: pnpm db:generate

      - name: Run ESLint
        run: pnpm lint

      - name: Run Typecheck
        run: pnpm typecheck

  # ────────────────────────────────────────────────────────────────
  # Job 2 — Vitest unit + integration tests (BLOCKING)
  # ────────────────────────────────────────────────────────────────
  vitest:
    name: Vitest
    runs-on: ubuntu-latest
    needs: lint-typecheck

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        # Use the default sqlite provider — the generated client types are
        # identical for sqlite/postgres so any provider works for typecheck
        # + Vitest (which exercises a sqlite local DB).
        run: pnpm db:generate

      - name: Run Vitest
        run: pnpm test

  # ────────────────────────────────────────────────────────────────
  # Job 3 — Playwright E2E (NON-BLOCKING)
  # ────────────────────────────────────────────────────────────────
  playwright:
    name: Playwright E2E
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Install Chromium system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      - name: Run Playwright E2E tests
        run: pnpm test:e2e

      - name: Upload Playwright traces & screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  # ────────────────────────────────────────────────────────────────
  # Job 4 — Foundry smart contracts (BLOCKING when contracts/ touched)
  # ────────────────────────────────────────────────────────────────
  foundry:
    name: Foundry (smart contracts)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Build contracts
        working-directory: contracts
        run: forge build --sizes

      - name: Run Foundry tests
        working-directory: contracts
        run: forge test --summary -vvv
